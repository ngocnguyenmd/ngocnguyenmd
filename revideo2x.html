<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cắt Video Offline</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#09090b;color:#e4e4e7;display:flex;justify-content:center;padding:20px}
.wrap{width:100%;max-width:900px}
h1{text-align:center;font-size:24px;color:#fafafa;margin-bottom:6px}
.sub{text-align:center;font-size:13px;color:#71717a;margin-bottom:24px}
#dropZone{border:2px dashed #3f3f46;border-radius:12px;padding:50px;text-align:center;cursor:pointer;transition:.2s;margin-bottom:20px}
#dropZone:hover{border-color:#a1a1aa;background:#18181b}
#dropZone p{margin:4px 0}
#dropZone .icon{font-size:40px;margin-bottom:8px}
#dropZone .main-text{font-size:16px;color:#d4d4d8;font-weight:600}
#dropZone .hint{font-size:12px;color:#52525b}
#dropZone input{display:none}
.player{background:#000;border-radius:10px;overflow:hidden;margin-bottom:12px;display:none}
.player video{width:100%;max-height:450px;display:block}
.tl{background:#18181b;border:1px solid #27272a;border-radius:10px;padding:12px;margin-bottom:12px;display:none}
.tl-controls{display:flex;gap:6px;align-items:center;margin-bottom:8px;font-family:monospace;font-size:12px;color:#a1a1aa}
.tl-btn{padding:4px 10px;background:#27272a;border:none;border-radius:6px;color:#d4d4d8;cursor:pointer;font-weight:600}
.tl-btn:hover{background:#3f3f46}
.bar-wrap{flex:1;position:relative;height:16px;background:#27272a;border-radius:8px;cursor:pointer;overflow:visible}
.bar-fill{position:absolute;top:0;left:0;height:100%;background:#0ea5e9;border-radius:8px;pointer-events:none;width:0%}
.sel-range{position:absolute;top:-2px;bottom:-2px;background:rgba(14,165,233,0.25);border-left:2px solid #22c55e;border-right:2px solid #ef4444;pointer-events:none;z-index:10;display:none}
.marker{position:absolute;top:-4px;width:6px;height:24px;border-radius:3px;cursor:ew-resize;z-index:20;box-shadow:0 0 6px rgba(0,0,0,.6)}
.marker-s{background:#22c55e;left:0%}
.marker-e{background:#ef4444;left:100%}
.marker:hover{transform:scaleX(1.4)}
.tl-actions{display:flex;gap:6px;margin-top:8px}
.btn-add{flex:1;padding:8px;background:rgba(14,165,233,0.15);border:1px solid #0ea5e9;border-radius:8px;color:#38bdf8;font-weight:600;cursor:pointer;font-size:13px}
.btn-add:hover{background:rgba(14,165,233,0.3)}
.seg-wrap{background:#18181b;border:1px solid #27272a;border-radius:10px;padding:12px;margin-bottom:16px;display:none}
.seg-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:12px;color:#a1a1aa}
.seg-head button{background:none;border:none;color:#ef4444;cursor:pointer;font-size:12px}
.seg-item{display:flex;align-items:center;gap:8px;background:#27272a;padding:6px 10px;border-radius:6px;margin-bottom:4px}
.seg-item .num{background:#0ea5e9;color:#000;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px}
.seg-item .time{flex:1;font-family:monospace;font-size:12px;color:#d4d4d8}
.seg-item .dur{font-family:monospace;font-size:11px;color:#71717a}
.seg-item .del{background:none;border:none;color:#52525b;cursor:pointer;font-size:16px;padding:0 4px;line-height:1}
.seg-item .del:hover{color:#ef4444}
.export-wrap{display:flex;justify-content:center}
.btn-export{padding:12px 32px;background:#16a34a;border:none;border-radius:10px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(22,163,74,.3);transition:.2s}
.btn-export:hover{background:#15803d}
.btn-export:disabled{opacity:.3;cursor:not-allowed;box-shadow:none}
.status{background:#18181b;border:1px solid #27272a;border-radius:10px;padding:16px;text-align:center;margin-top:16px;display:none}
.prog-w{width:100%;height:6px;background:#27272a;border-radius:3px;overflow:hidden;margin-bottom:8px}
.prog-b{height:100%;width:0%;background:#22c55e;border-radius:3px;transition:width .3s}
.status p{font-size:13px;color:#a1a1aa}
</style>
</head>
<body>
<div class="wrap">
    <h1>✂️ Cắt Video Offline</h1>
    <p class="sub">Kéo thả file MP4 vào → Kéo marker Xanh/Đỏ → Nhấn Thêm → Xuất (Không cần server)</p>

    <div id="dropZone" onclick="document.getElementById('fIn').click()">
        <p class="icon">📁</p>
        <p class="main-text">Kéo thả video vào đây</p>
        <p class="hint">hoặc click để chọn file (MP4/WebM)</p>
        <input type="file" id="fIn" accept="video/*">
    </div>

    <div class="player" id="playerWrap"><video id="vid" controls></video></div>

    <div class="tl" id="tlWrap">
        <div class="tl-controls">
            <button class="tl-btn" id="b-5">-5s</button>
            <button class="tl-btn" id="b-1">-1s</button>
            <div class="bar-wrap" id="barWrap">
                <div class="bar-fill" id="barFill"></div>
                <div class="sel-range" id="selRange"></div>
                <div class="marker marker-s" id="mS"></div>
                <div class="marker marker-e" id="mE"></div>
            </div>
            <button class="tl-btn" id="b1">+1s</button>
            <button class="tl-btn" id="b5">+5s</button>
            <span id="timeTxt" style="min-width:50px;text-align:right;color:#38bdf8;font-weight:700">0:00</span>
        </div>
        <div class="tl-actions">
            <button class="btn-add" id="bAdd">➕ Thêm đoạn này</button>
        </div>
    </div>

    <div class="seg-wrap" id="segWrap">
        <div class="seg-head">
            <span>Đoạn giữ lại:</span>
            <button id="bClr">Xóa hết</button>
        </div>
        <div id="segList"></div>
    </div>

    <div class="export-wrap">
        <button class="btn-export" id="btnExport" disabled>🚀 Cắt và Tải Video</button>
    </div>

    <div class="status" id="statBox">
        <div class="prog-w"><div class="prog-b" id="progBar"></div></div>
        <p id="statTxt">Đang xử lý...</p>
    </div>
</div>

<!-- BỎ type="module" ĐỂ CÁC HÀM THUỘC TOÀN CỤC -->
<script>
// Dùng Promise cục bộ để load FFmpeg (Tương thích mọi trình duyệt, không lỗi scope)
var FFmpegLib = {
    ffmpeg: null,
    fetchFile: null,
    loaded: false,
    load: async function() {
        if (this.loaded) return;
        // Import UMD bundle (Không dùng ES Module, không lỗi scope)
        const module = await import('https://unpkg.com/@anthropic-ai/ffmpeg-core@0.12.6/dist/umd/ffmpeg.js');
        this.ffmpeg = module.createFFmpeg({ log: false });
        await this.ffmpeg.load();
        this.fetchFile = module.fetchFile;
        this.loaded = true;
    }
};

// GÁN SỰ KIỆN BẰNG JAVASCRIPT (Không dùng onclick="" trong HTML để tránh lỗi scope)
document.addEventListener('DOMContentLoaded', function() {
    const vid = document.getElementById('vid');
    let segs = [], pStart = -1, pEnd = -1, curFile = null;

    function fmt(s) {
        if(!s||!isFinite(s)) return "0:00";
        return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0');
    }

    // --- Upload ---
    const dz = document.getElementById('dropZone');
    const fi = document.getElementById('fIn');
    dz.addEventListener('dragover', e => { e.preventDefault(); dz.style.borderColor='#38bdf8'; dz.style.background='#0c1929'; });
    dz.addEventListener('dragleave', () => { dz.style.borderColor='#3f3f46'; dz.style.background=''; });
    dz.addEventListener('drop', e => { e.preventDefault(); dz.style.borderColor='#3f3f46'; dz.style.background=''; if(e.dataTransfer.files[0]) load(e.dataTransfer.files[0]); });
    fi.addEventListener('change', e => { if(e.target.files[0]) load(e.target.files[0]); });

    function load(file) {
        curFile = file;
        vid.src = URL.createObjectURL(file);
        document.getElementById('playerWrap').style.display = 'block';
        document.getElementById('tlWrap').style.display = 'block';
        dz.style.display = 'none';
        segs = []; renderSegs();
        vid.onloadedmetadata = () => { pStart = 0; pEnd = vid.duration; updUI(); };
    }

    // --- Player ---
    vid.addEventListener('timeupdate', () => {
        document.getElementById('timeTxt').innerText = fmt(vid.currentTime);
        document.getElementById('barFill').style.width = (vid.currentTime/vid.duration*100)+'%';
    });

    function skip(s) { if(vid.duration) vid.currentTime = Math.max(0, vid.currentTime+s); }
    
    document.getElementById('b-5').addEventListener('click', () => skip(-5));
    document.getElementById('b-1').addEventListener('click', () => skip(-1));
    document.getElementById('b1').addEventListener('click', () => skip(1));
    document.getElementById('b5').addEventListener('click', () => skip(5));

    document.getElementById('barWrap').addEventListener('mousedown', function(e) {
        if(!vid.duration) return;
        let r = e.currentTarget.getBoundingClientRect();
        vid.currentTime = ((e.clientX - r.left) / r.width) * vid.duration;
    });

    // --- Markers ---
    function startDrag(type) {
        return function(e) {
            e.preventDefault(); e.stopPropagation();
            function move(ev) {
                let r = document.getElementById('barWrap').getBoundingClientRect();
                let p = Math.max(0, Math.min(1, (ev.clientX - r.left) / r.width));
                let time = p * vid.duration;
                vid.currentTime = time;
                if(type==='s') { pStart=time; if(pEnd>=0&&pEnd<=pStart) pEnd=-1; }
                else { pEnd=time; if(pStart>=0&&pStart>=pEnd) pStart=-1; }
                updUI();
            }
            function up() { document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', up); }
            document.addEventListener('mousemove', move);
            document.addEventListener('mouseup', up);
        };
    }
    document.getElementById('mS').addEventListener('mousedown', startDrag('s'));
    document.getElementById('mE').addEventListener('mousedown', startDrag('e'));

    function updUI() {
        if(!vid.duration) return;
        let ps = (pStart/vid.duration)*100, pe = (pEnd/vid.duration)*100;
        document.getElementById('mS').style.left = ps+'%';
        document.getElementById('mE').style.left = pe+'%';
        let sr = document.getElementById('selRange');
        if(pStart>=0 && pEnd>=0 && pEnd>pStart) { sr.style.display='block'; sr.style.left=ps+'%'; sr.style.width=(pe-ps)+'%'; }
        else { sr.style.display='none'; }
    }

    // --- Segments ---
    function addSeg() {
        if(!vid.duration||pStart<0||pEnd<0||pEnd<=pStart) return alert('Kéo marker Xanh và Đỏ cho đúng khoảng thời gian!');
        segs.push({s:pStart, e:pEnd}); pStart=-1; pEnd=-1; updUI(); renderSegs();
    }
    function removeSeg(i) { segs.splice(i,1); renderSegs(); }
    function clearSegs() { segs=[]; renderSegs(); }

    function renderSegs() {
        let list = document.getElementById('segList');
        let wrap = document.getElementById('segWrap');
        document.getElementById('btnExport').disabled = !segs.length;
        if(!segs.length) { wrap.style.display='none'; return; }
        wrap.style.display='block';
        list.innerHTML = segs.map((s,i) => 
            '<div class="seg-item">' +
            '<span class="num">'+(i+1)+'</span>' +
            '<span class="time">'+fmt(s.s)+' → '+fmt(s.e)+'</span>' +
            '<span class="dur">'+(s.e-s.s).toFixed(1)+'s</span>' +
            '<button class="del" data-i="'+i+'">×</button>' +
            '</div>'
        ).join('');
        
        // Gán sự kiện xóa cho các nút mới tạo
        list.querySelectorAll('.del').forEach(btn => {
            btn.addEventListener('click', function() {
                removeSeg(parseInt(this.dataset.i));
            });
        });
    }

    document.getElementById('bAdd').addEventListener('click', addSeg);
    document.getElementById('bClr').addEventListener('click', clearSegs);

    // --- Export ---
    document.getElementById('btnExport').addEventListener('click', async function() {
        if(!segs.length || !curFile) return;
        const btn = document.getElementById('btnExport');
        btn.disabled = true; btn.innerText = "⏳ Đang tải FFmpeg (lần đầu 10-20s)...";
        let sb = document.getElementById('statBox'); sb.style.display='block';
        document.getElementById('progBar').style.width='0%';
        document.getElementById('statTxt').innerText='Đang nạp FFmpeg...';

        try {
            if (!FFmpegLib.loaded) await FFmpegLib.load();

            document.getElementById('statTxt').innerText='Đang đọc file...';
            document.getElementById('progBar').style.width='10%';
            
            FFmpegLib.ffmpeg.FS('writeFile', 'input.mp4', await FFmpegLib.fetchFile(curFile));

            for (let i = 0; i < segs.length; i++) {
                let s = segs[i];
                document.getElementById('statTxt').innerText = 'Đang cắt đoạn '+(i+1)+'/'+segs.length+'...';
                document.getElementById('progBar').style.width = (10 + 80/segs.length*(i+1)) + '%';
                await FFmpegLib.ffmpeg.run('-ss', String(s.s), '-i', 'input.mp4', '-t', String(s.e-s.s), '-c', 'copy', '-avoid_negative_ts', '1', 's'+i+'.mp4');
            }

            let list = segs.map((_,i) => "file 's"+i+".mp4'\n").join('');
            FFmpegLib.ffmpeg.FS('writeFile', 'list.txt', list);
            
            document.getElementById('statTxt').innerText = 'Đang ghép...';
            document.getElementById('progBar').style.width = '95%';
            await FFmpegLib.ffmpeg.run('-f','concat','-safe','0','-i','list.txt','-c','copy','-movflags','+faststart','out.mp4');

            document.getElementById('statTxt').innerText = 'Đang tạo file tải về...';
            document.getElementById('progBar').style.width = '100%';

            let data = FFmpegLib.ffmpeg.FS('readFile', 'out.mp4');
            let blob = new Blob([data.buffer], {type:'video/mp4'});
            let a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = curFile.name.replace(/\.[^.]+$/, '') + '_da_cat.mp4';
            a.click();

            document.getElementById('statTxt').innerText = '✅ Xong! Size: '+(blob.size/1024/1024).toFixed(2)+' MB';
            btn.innerText = "🚀 Cắt và Tải Video";
            btn.disabled = false;

            FFmpegLib.ffmpeg.FS('unlink','input.mp4'); FFmpegLib.ffmpeg.FS('unlink','out.mp4'); FFmpegLib.ffmpeg.FS('unlink','list.txt');
            segs.forEach((_,i) => { try{FFmpegLib.ffmpeg.FS('unlink','s'+i+'.mp4')}catch(e){} });
        } catch(e) {
            document.getElementById('statTxt').innerText = '❌ Lỗi: ' + e.message;
            btn.innerText = "🚀 Cắt và Tải Video"; btn.disabled = false;
        }
    });
});
</script>
</body>
</html>
